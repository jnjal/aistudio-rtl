<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #1a1a1a;
      color: #f3f4f6;
      direction: rtl;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #374151;
      padding-bottom: 12px;
      margin-bottom: 16px;
    }
    .logo-title {
      font-size: 14px;
      font-weight: 700;
      color: #3b82f6;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 9999px;
      background-color: #1e3a8a;
      color: #60a5fa;
      font-weight: 500;
    }
    .status-badge.disabled {
      background-color: #374151;
      color: #9ca3af;
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .setting-label {
      font-size: 13px;
      font-weight: 500;
    }
    .setting-desc {
      font-size: 11px;
      color: #9ca3af;
      margin-top: -2px;
    }
    /* Switch Styles */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 22px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #4b5563;
      transition: .3s;
      border-radius: 34px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #3b82f6;
    }
    input:checked + .slider:before {
      transform: translateX(22px);
    }
    .footer {
      border-top: 1px solid #374151;
      padding-top: 10px;
      margin-top: 16px;
      text-align: center;
      font-size: 10px;
      color: #6b7280;
    }
    .vazir-test {
      font-family: 'Vazirmatn', sans-serif;
      background-color: #2d3748;
      padding: 6px;
      border-radius: 6px;
      font-size: 11px;
      text-align: center;
      margin-top: 10px;
      color: #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-title">
      <span>پچ فارسی‌ساز AI Studio</span>
    </div>
    <div id="statusBadge" class="status-badge">فعال</div>
  </div>

  <div class="setting-row">
    <div>
      <div class="setting-label">فعالسازی افزونه</div>
      <div class="setting-desc">راست‌چین‌ساز هوشمند و اعمال فونت وزیرمتن</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="togglePatch" checked>
      <span class="slider"></span>
    </</label>
  </div>

  <div class="setting-row">
    <div>
      <div class="setting-label">راست‌چین‌سازی خودکار</div>
      <div class="setting-desc">جداسازی کدهای انگلیسی و متون فارسی</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggleDynamicDir" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="vazir-test">
    نمونه فونت وزیرمتن: چت هوش مصنوعی فارسی
  </div>

  <div class="footer">
    توسعه داده شده با ❤️ برای کاربران فارسی‌زبان
  </div>

  <script src="popup.js"></script>
</body>
</html>
